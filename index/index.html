<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai_cards - Изучение с нейросетью</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

body {
    background-color: #f5f7fb;
    color: #080808;
    line-height: 1.5;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.header {
    margin-bottom: 32px;
}

.header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: #2d5dc7;
    margin-bottom: 8px;
}

.header p {
    color: #050505;
}

.ai-input-section {
    background: rgb(41, 134, 187);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 40px;
    box-shadow: 0 4px 6px -1px rgba(105, 175, 196, 0.1);
}

.ai-input-label {
    display: block;
    font-weight: 500;
    margin-bottom: 12px;
    color: #070707;
}

.ai-input-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-end;
}

.ai-input-field {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid #e7eef1;
    border-radius: 24px;
    font-size: 1rem;
    transition: all 0.2s;
    resize: vertical;
    min-height: 60px;
    background-color: #eef1f1;
}

.ai-input-field:focus {
    outline: none;
    border-color: #0a0a0a;
    background-color: white;
    box-shadow: 0 0 0 3px rgba(49, 146, 238, 0.1);
}

.ai-submit-btn {
    background-color: rgba(49, 146, 238, 0.1ed);
    color: rgb(9, 10, 12);
    border: none;
    border-radius: 24px;
    padding: 14px 28px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
    white-space: nowrap;
    height: fit-content;
}

.ai-submit-btn:hover {
    background-color: #71c9e4;
}

.decks-section h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #070b11;
}

.decks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.deck-card {
    background: rgb(190, 221, 241);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 3px 0 rgba(66, 140, 201, 0.1);
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
}

.deck-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(66, 140, 201, 0.1);
    border-color: #348dc9;
}

.deck-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #458be6;
}

.deck-meta {
    display: flex;
    justify-content: space-between;
    color: #143768;
    font-size: 0.9rem;
}

.deck-topic {
    background-color: #f1f5f9;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    color: #649ae6;
}

.deck-count {
    display: flex;
    align-items: center;
    gap: 4px;
}

.deck-count::before {
    font-size: 0.9rem;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background-color: white;
    border-radius: 24px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 1.5rem;
    cursor: pointer;
    color: #5f99e9;
    transition: color 0.2s;
}

.close-btn:hover {
    color: #4a88df;
}

.study-header {
    text-align: center;
    margin-bottom: 24px;
}

.study-header h2 {
    font-size: 1.5rem;
    color: #345ec0;
    margin-bottom: 4px;
}

.study-header .card-counter {
    color: #4081db;
    font-size: 0.95rem;
}

.flashcard {
    background-color: #f8fafc;
    border-radius: 16px;
    padding: 32px 24px;
    margin-bottom: 24px;
    min-height: 250px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    border: 2px solid #e2e8f0;
}

.flashcard:hover {
    transform: scale(1.02);
}

.flashcard .title {
    font-size: 1.3rem;
    font-weight: 600;
    color: #3562ca;
    margin-bottom: 12px;
}

.flashcard .task {
    font-size: 1.1rem;
    color: #3871c0;
    margin-bottom: 20px;
}

.flashcard .answer {
    font-size: 1.2rem;
    color: #287bc9;
    font-weight: 500;
    padding-top: 16px;
    border-top: 2px dashed #cbd5e1;
    width: 100%;
}

.flashcard .hint {
    color: #4d94f7;
    font-size: 0.9rem;
    margin-top: 12px;
}

.flashcard .variants {
    text-align: left;
    width: 100%;
    background-color: white;
    padding: 16px;
    border-radius: 12px;
    margin-top: 12px;
}

.flashcard .variants p {
    padding: 8px;
    border-bottom: 1px solid #e2e8f0;
}

.flashcard .variants p:last-child {
    border-bottom: none;
}

.next-btn {
    background-color: #67a7f1;
    color: white;
    border: none;
    border-radius: 40px;
    padding: 14px 32px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: fit-content;
    margin: 0 auto;
    display: block;
}

.next-btn:hover {
    background-color: #67a7f1;
    transform: translateX(2px);
}

.next-btn:disabled {
    background-color: #cbd5e1;
    cursor: not-allowed;
}

.hidden {
    display: none;
}
    </style>
</head>
<body>
    <main class = 'page'>
        <div id = 'app'></div>
    </main>
    <div class="container">
        <div class="header">
            <h1>ai_cards</h1>
            <p>Создавайте колоды для изучения с помощью нейросети</p>
        </div>

        <div class="ai-input-section">
            <label class="ai-input-label">Напишите тему, которую хотите изучить:</label>
            <div class="ai-input-wrapper">
                <textarea 
                    class="ai-input-field" 
                    placeholder="Например: 'Создай колоду по физике для 9 класса'"
                    rows="2"
                    id="aiPrompt"
                >Физика</textarea>
                <button class="ai-submit-btn" id="createDeckBtn">Создать колоду</button>
            </div>
        </div>

        <div class="decks-section">
            <h2>Ваши колоды</h2>
            <div class="decks-grid" id="decksGrid"></div>
        </div>
    </div>

    <div class="modal" id="studyModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            
            <div class="study-header">
                <h2 id="deckTitle">Физика</h2>
                <div class="card-counter" id="cardCounter"></div>
            </div>

            <div id="flashcardContainer"></div>

            <button class="next-btn" id="nextCardBtn">Следующая карточка →</button>
        </div>
    </div>
    <script type="module" src="/index/app.js"></script>
</body>
</html>
