<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ai_cards</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --bg-2: #131a2f;
      --surface: rgba(18, 24, 42, 0.88);
      --surface-2: rgba(24, 32, 56, 0.92);
      --text: #eef2ff;
      --muted: #a8b3cf;
      --line: rgba(255, 255, 255, 0.08);
      --primary: #7c9cff;
      --primary-2: #95adff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1f2b57 0%, transparent 35%),
        radial-gradient(circle at bottom right, #1b5f56 0%, transparent 30%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    button,
    input {
      font: inherit;
    }

    .container {
      position: relative;
      width: min(100%, 920px);
      min-height: 580px;
      border-radius: 32px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
        var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .form-box {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 40px;
      color: var(--text);
      background: transparent;
      text-align: center;
      z-index: 1;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        right 0.6s ease-in-out,
        opacity 0.35s ease,
        visibility 0.35s ease;
    }

    .form-box.login {
      right: 0;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .container.active .form-box.login {
      right: 50%;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .form-box.register {
      right: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .container.active .form-box.register {
      right: 50%;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    form {
      width: 100%;
    }

    .container h1 {
      font-size: clamp(2rem, 4vw, 2.5rem);
      line-height: 1.05;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text);
    }

    .form-subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.98rem;
    }

    .input-box {
      position: relative;
      margin: 18px 0;
    }

    .input-box input {
      width: 100%;
      padding: 14px 48px 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      outline: none;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255,255,255,0.05);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .input-box input::placeholder {
      color: #8f9abb;
      font-weight: 400;
    }

    .input-box input:focus {
      border-color: rgba(124,156,255,0.8);
      box-shadow: 0 0 0 4px rgba(124,156,255,0.18);
      transform: translateY(-1px);
    }

    .input-box i {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--muted);
      pointer-events: none;
    }

    .forgot-link {
      margin: 4px 0 18px;
      text-align: left;
    }

    .forgot-link a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.18s ease;
    }

    .forgot-link a:hover {
      color: var(--text);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .form-box .btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #0b1020;
      box-shadow: 0 12px 24px rgba(124,156,255,0.22);
    }

    .toggle-box {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .toggle-box::before {
      content: "";
      position: absolute;
      left: -250%;
      width: 300%;
      height: 100%;
      border-radius: 150px;
      z-index: 2;
      transition: 1.8s ease-in-out;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.12), transparent 25%),
        linear-gradient(135deg, rgba(124,156,255,0.88), rgba(124,156,255,0.55));
      box-shadow: inset 0 0 60px rgba(255,255,255,0.08);
    }

    .container.active .toggle-box::before {
      left: 50%;
    }

    .toggle-panel {
      position: absolute;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
      color: var(--text);
      z-index: 2;
      transition: 0.6s ease-in-out;
    }

    .toggle-panel.toggle-left {
      left: 0;
    }

    .container.active .toggle-panel.toggle-left {
      left: -50%;
      transition-delay: 0.6s;
    }

    .toggle-panel.toggle-right {
      right: -50%;
    }

    .container.active .toggle-panel.toggle-right {
      right: 0;
      transition-delay: 1.2s;
    }

    .toggle-panel p {
      margin: 14px 0 22px;
      max-width: 280px;
      color: rgba(238, 242, 255, 0.9);
      line-height: 1.6;
    }

    .toggle-panel .btn {
      width: 170px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: none;
      backdrop-filter: blur(10px);
    }

    .toggle-panel .btn:hover {
      background: rgba(255,255,255,0.14);
    }

    @media (max-width: 860px) {
      .container {
        min-height: 760px;
      }

      .form-box {
        width: 100%;
        height: 70%;
        right: 0;
        top: auto;
        bottom: 0;
        padding: 28px 20px;
      }

      .form-box.login {
        bottom: 0;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .container.active .form-box.login {
        right: 0;
        bottom: 30%;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .form-box.register {
        bottom: 0;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .container.active .form-box.register {
        right: 0;
        bottom: 30%;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .toggle-box::before {
        left: 0;
        top: -270%;
        width: 100%;
        height: 300%;
        border-radius: 20vw;
      }

      .container.active .toggle-box::before {
        left: 0;
        top: 70%;
      }

      .toggle-panel {
        width: 100%;
        height: 30%;
        padding: 20px;
      }

      .toggle-panel.toggle-left {
        top: 0;
        left: 0;
      }

      .container.active .toggle-panel.toggle-left {
        left: 0;
        top: -30%;
      }

      .toggle-panel.toggle-right {
        right: 0;
        bottom: -30%;
      }

      .container.active .toggle-panel.toggle-right {
        bottom: 0;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
      }

      .container {
        border-radius: 24px;
      }

      .form-box,
      .toggle-panel {
        padding-left: 16px;
        padding-right: 16px;
      }

      .container h1 {
        font-size: 1.75rem;
      }

      .toggle-panel .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-box login">
      <form action="">
        <h1>Login</h1>
        <p class="form-subtitle">Войдите, чтобы продолжить обучение</p>

        <div class="input-box">
          <input type="text" placeholder="Username" required>
          <i class="bx bx-user"></i>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Password" required>
          <i class="bx bx-lock"></i>
        </div>

        <div class="forgot-link">
          <a href="#">Forgot password?</a>
        </div>

        <button type="button" class="btn" onclick="window.location.href='/index'">
          Login
        </button>
      </form>
    </div>

    <div class="form-box register">
      <form action="">
        <h1>Registration</h1>
        <p class="form-subtitle">Создайте аккаунт для новых колод</p>

        <div class="input-box">
          <input type="text" placeholder="Username" required>
          <i class="bx bx-user"></i>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Password" required>
          <i class="bx bx-lock"></i>
        </div>

        <button type="button" class="btn">
          Register
        </button>
      </form>
    </div>

    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1>Hello, Welcome!</h1>
        <p>Don't have an account? Create one and start building decks with ai_cards.</p>
        <button type="button" class="btn register-btn">Register</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1>Welcome Back!</h1>
        <p>Already have an account? Sign in and continue learning.</p>
        <button type="button" class="btn login-btn">Login</button>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector('.container');
    const registerBtn = document.querySelector('.register-btn');
    const loginBtn = document.querySelector('.login-btn');

    registerBtn.addEventListener('click', () => {
      container.classList.add('active');
    });

    loginBtn.addEventListener('click', () => {
      container.classList.remove('active');
    });
  </script>
</body>
</html>
